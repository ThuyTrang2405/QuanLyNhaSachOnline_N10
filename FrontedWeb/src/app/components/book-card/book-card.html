<div class="book-card">
  <div class="book-image" [routerLink]="['/book', book.id]">
    <img [src]="book.image" [alt]="book.title">
  </div>

  <div class="book-info">
    <h3 class="book-title" [routerLink]="['/book', book.id]">{{ book.title }}</h3>
    
    <div class="price-section">
      <div class="current-price">{{ book.price | number:'1.0-0' }}₫</div>
    </div>

    <div class="book-stats">
      <div class="rating">
        <span class="stars">⭐⭐⭐⭐⭐</span>
        <span class="rating-text">{{ getRating() }}</span>
      </div>
      <div class="sold-count">Đã bán {{ getSoldCount() }}</div>
    </div>

    <button class="add-to-cart-btn" (click)="addToCart()">
      Thêm vào giỏ
    </button>
  </div>
</div>
