<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>📚 Đăng nhập</h1>
      <p>Chào mừng bạn quay trở lại BookStore</p>
    </div>

    <form class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          id="email"
          type="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="Nhập email của bạn"
          class="form-input">
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input 
          id="password"
          type="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Nhập mật khẩu"
          class="form-input">
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox"> Ghi nhớ đăng nhập
        </label>
        <a href="#" class="forgot-password">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn btn-primary login-btn">
        Đăng nhập
      </button>

      <div class="divider">
        <span>hoặc</span>
      </div>

      <button type="button" class="btn social-btn google-btn">
        <span>🔍</span> Đăng nhập với Google
      </button>

      <button type="button" class="btn social-btn facebook-btn">
        <span>📘</span> Đăng nhập với Facebook
      </button>
    </form>

    <div class="login-footer">
      <p>Chưa có tài khoản? <a href="#" class="register-link">Đăng ký ngay</a></p>
    </div>
  </div>
</div>
