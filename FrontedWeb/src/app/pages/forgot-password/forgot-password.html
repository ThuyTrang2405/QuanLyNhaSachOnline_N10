<div class="forgot-container">
  <div class="forgot-card">

    <!-- Chưa submit -->
    <ng-container *ngIf="!submitted">
      <div class="forgot-header">
        <div class="icon">🔑</div>
        <h1>Quên mật khẩu?</h1>
        <p>Nhập email của bạn, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>
      </div>

      <form class="forgot-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Nhập địa chỉ email của bạn"
            class="form-input"
            [class.input-error]="errorMsg">
          <span class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</span>
        </div>

        <button type="submit" class="btn-submit">
          Gửi yêu cầu
        </button>
      </form>

      <div class="back-link">
        <a routerLink="/login">← Quay lại đăng nhập</a>
      </div>
    </ng-container>

    <!-- Đã submit thành công -->
    <ng-container *ngIf="submitted">
      <div class="success-state">
        <div class="success-icon">📧</div>
        <h2>Đã gửi yêu cầu!</h2>
        <p>
          Chức năng này sẽ được kích hoạt sau khi backend hoàn thiện.<br>
          Vui lòng liên hệ quản trị viên để được hỗ trợ.
        </p>
        <a routerLink="/login" class="btn-back-login">Quay lại đăng nhập</a>
      </div>
    </ng-container>

  </div>
</div>
